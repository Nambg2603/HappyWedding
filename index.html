<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Dạm Ngõ - Nguyễn Nam & Thân Hiền</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-light: #fcf6ba;
            --gold-mid: #bf953f;
            --gold-dark: #aa771c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000 url('backgr.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
        }

        /* Hiệu ứng Vignette: Tối dần về các góc để tạo chiều sâu và tập trung ánh sáng vào giữa */
        .vignette-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 1;
        }

        /* Một lớp viền mỏng, thanh lịch (Minimalist Frame) */
        .cinematic-frame {
            position: absolute;
            top: 30px; left: 30px;
            right: 30px; bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            z-index: 5;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Tiêu đề thanh lịch */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 12px;
            font-weight: 300;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        /* Kỹ thuật Text Masking: Chữ lấp lánh như vàng */
        .gold-shimmer-text {
            font-family: 'Great Vibes', cursive;
            font-size: 8rem;
            margin: 10px 0;
            padding: 10px;
            background: linear-gradient(to right, var(--gold-mid), var(--gold-light), var(--gold-dark), var(--gold-light), var(--gold-mid));
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .gold-shimmer-text span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-style: italic;
            margin: 0 15px;
            opacity: 0.8;
        }

        .date-box {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .solar-date {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 8px;
            color: var(--gold-light);
            border-bottom: 1px solid rgba(252, 246, 186, 0.4);
            padding-bottom: 10px;
        }

        .lunar-date {
            font-size: 1.3rem;
            font-style: italic;
            color: #aaa;
            margin-top: 5px;
        }

        /* Hiệu ứng Lấy nét ống kính (Lens Focus) cho chữ chạy */
        #dynamic-text-wrapper {
            margin-top: 60px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dynamic-text {
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            color: #fff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transition: opacity 1.5s ease, filter 1.5s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        /* Class khi chữ đang "out nét" và biến mất */
        #dynamic-text.focus-out {
            opacity: 0;
            filter: blur(12px);
            transform: scale(1.1);
        }

        /* Hạt Bokeh hữu cơ (Organic Bokeh Particles) */
        #bokeh-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .bokeh {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle, rgba(252, 246, 186, 0.8) 0%, rgba(252, 246, 186, 0) 70%);
            border-radius: 50%;
            opacity: 0;
            animation: floatUpSway linear forwards;
        }

        /* --- Keyframes --- */
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Bay lên và lượn lờ sang hai bên (Swaying motion) */
     /* Bay lên và lượn lờ sang hai bên (Swaying motion) */
        @keyframes floatUpSway {
            0% { 
                transform: translateY(0) translateX(0) scale(0.5); 
                opacity: 0; 
            }
            20% { 
                opacity: 0.8; /* <-- Đã sửa lỗi ở đây */
            }
            50% { 
                transform: translateY(-50vh) translateX(var(--sway-x)) scale(1); 
                opacity: 0.6; 
            }
            100% { 
                transform: translateY(-110vh) translateX(calc(var(--sway-x) * -1)) scale(1.5); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="vignette-overlay"></div>
    <div class="cinematic-frame"></div>
    <div id="bokeh-container"></div>

    <div class="main-content">
        <div class="subtitle">Lễ Dạm Ngõ</div>
        
        <div class="gold-shimmer-text">Nguyễn Nam <span>&</span> Thân Hiền</div>
        
        <div class="date-box">
            <div class="solar-date">20 . 09 . 2026</div>
            <div class="lunar-date">(Tức ngày 10 tháng 08 năm Bính Ngọ)</div>
        </div>
        
        <div id="dynamic-text-wrapper">
            <div id="dynamic-text">Sự hiện diện của quý vị là niềm vinh hạnh của gia đình.</div>
        </div>
    </div>

    <script>
        // --- 1. HIỆU ỨNG BOKEH HỮU CƠ (LƯỢN SÓNG) ---
        function createBokeh() {
            const container = document.getElementById('bokeh-container');
            const bokeh = document.createElement('div');
            bokeh.classList.add('bokeh');
            
            // Random kích thước điểm sáng
            const size = Math.random() * 40 + 10;
            bokeh.style.width = `${size}px`;
            bokeh.style.height = `${size}px`;
            
            // Random vị trí ngang
            bokeh.style.left = `${Math.random() * 100}vw`;
            
            // Cài đặt độ lắc ngang (Sway) bằng CSS Variable
            const swayAmount = (Math.random() * 100 - 50) + 'px'; 
            bokeh.style.setProperty('--sway-x', swayAmount);
            
            // Thời gian bay chậm rãi
            const duration = Math.random() * 10 + 8;
            bokeh.style.animationDuration = `${duration}s`;
            
            container.appendChild(bokeh);
            
            setTimeout(() => {
                bokeh.remove();
            }, duration * 1000);
        }

        // Tạo hạt liên tục
        setInterval(createBokeh, 300);

        // --- 2. HIỆU ỨNG LẤY NÉT ỐNG KÍNH (LENS FOCUS TEXT) ---
        const messages = [
            "Hành trình yêu thương chính thức bắt đầu...",
            "Sự hiện diện của quý vị là niềm vinh hạnh của gia đình.",
            "Trân trọng cảm ơn hai bên gia đình đã vun đắp cho hạnh phúc lứa đôi.",
            "Trăm năm tình viên mãn - Bạc đầu nghĩa phu thê."
        ];
        
        let msgIndex = 0;
        const textElement = document.getElementById('dynamic-text');

        setInterval(() => {
            // Out nét
            textElement.classList.add('focus-out');
            
            setTimeout(() => {
                // Đổi nội dung khi đã mờ hẳn
                msgIndex = (msgIndex + 1) % messages.length;
                textElement.innerHTML = messages[msgIndex];
                // Lấy nét trở lại
                textElement.classList.remove('focus-out');
            }, 1500); // Khớp thời gian với transition CSS

        }, 10000);
    </script>
</body>
</html>
