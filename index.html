<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Dạm Ngõ - Nguyễn Nam & Thân Hiền</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* Đặt lại lề cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ẩn thanh cuộn */
            font-family: 'Playfair Display', serif;
        }

        /* Lớp phủ video nền */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo video phủ kín màn hình */
        }

        /* Lớp phủ mờ giúp chữ nổi bật hơn trên video */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Độ mờ nhẹ cho video tone vàng */
            z-index: -1;
        }

        /* Định dạng nội dung chữ chính - Đã xóa câu chúc phụ */
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffffff;
            z-index: 10;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.6); /* Đổ bóng để nổi bật */
            width: 100%; /* Dùng 100% để ép 1 dòng */
        }

        .title {
            font-size: 5rem; 
            text-transform: uppercase;
            letter-spacing: 7px; 
            margin-bottom: 25px;
            font-weight: 700;
            animation: fadeInDown 2s ease-out;
        }

        /* ĐIỀU CHỈNH: Ép tên nằm trên 1 dòng duy nhất */
        .names {
            font-family: 'Dancing Script', cursive;
            font-size: 7rem; 
            color: #ffebcd; /* Màu vàng nhạt ấm */
            margin-bottom: 25px;
            display: flex;
            flex-direction: row; /* Nằm ngang */
            flex-wrap: nowrap; /* Không cho phép rớt dòng */
            align-items: center;
            justify-content: center;
            gap: 20px;
            white-space: nowrap; /* Tuyệt đối tránh bẻ chữ */
            text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.7), 0 0 30px #ffdab9; 
            animation: zoomIn 2.5s ease-out;
        }

        .heart-center {
            color: #ff4d4d; /* Màu đỏ cho trái tim giữa 2 tên */
            font-size: 4rem; 
            animation: pulse 1.5s infinite;
        }

        .date {
            font-size: 3rem; 
            font-style: italic;
            letter-spacing: 3px;
            font-weight: 500;
            animation: fadeInUp 2s ease-out;
        }

        /* Hiệu ứng bay của trái tim trong suốt */
        .floating-heart {
            position: absolute;
            bottom: -50px;
            pointer-events: none; /* Không ngăn cản các thao tác click */
            z-index: 1;
            /* Dùng màu trắng có độ trong suốt */
            color: rgba(255, 255, 255, 0.5); 
            animation: floatUp linear infinite;
        }

        /* Các Keyframe tạo hiệu ứng xuất hiện của chữ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-70px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(70px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.4); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng bay lên ĐÃ GIẢM TỐC ĐỘ: nhẹ nhàng và chậm chạp */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.6) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.7; /* Hiện rõ nhất khi bắt đầu bay lên */
            }
            100% {
                transform: translateY(-120vh) scale(1.4) rotate(360deg);
                opacity: 0; /* Mờ dần khi lên tới đỉnh */
            }
        }

        /* Responsive cho điện thoại - Tự động co chữ để vừa 1 dòng */
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; letter-spacing: 3px; }
            .names { 
                font-size: 8vw; /* Dùng vw để chữ tự động co giãn vừa đúng chiều ngang điện thoại */
                gap: 10px; 
            }
            .heart-center { font-size: 7vw; }
            .date { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="backgr.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </div>
    
    <div class="overlay"></div>

    <div class="content">
        <h1 class="title">Lễ Dạm Ngõ</h1>
        <div class="names">
            <span>Nguyễn Nam</span>
            <span class="heart-center">❤️</span>
            <span>Thân Hiền</span>
        </div>
        <p class="date">Ngày 20.09.2026</p>
    </div>

    <div id="hearts-container"></div>

    <script>
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            
            // Biểu tượng trái tim
            heart.innerHTML = '❤'; 
            heart.classList.add('floating-heart');
            
            // Random kích thước trái tim (từ 15px đến 55px)
            const size = Math.random() * 40 + 15;
            heart.style.fontSize = `${size}px`;
            
            // Random vị trí xuất phát theo chiều ngang
            heart.style.left = `${Math.random() * 100}vw`;
            
            // GIẢM TỐC ĐỘ BAY LÊN: từ 12 giây đến 22 giây để trái tim lơ lửng rất lâu
            const duration = Math.random() * 10 + 12;
            heart.style.animationDuration = `${duration}s`;
            
            // Random độ mờ (opacity) để tạo chiều sâu
            heart.style.opacity = Math.random();

            container.appendChild(heart);
            
            // Xóa trái tim khỏi DOM sau khi bay xong
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Tạo trái tim mới mỗi 100 milliseconds
        // Dù tạo liên tục nhưng vì thời gian bay rất lâu, lượng trái tim 
        // lơ lửng trên màn hình sẽ rất dày đặc, lung linh và chậm rãi.
        setInterval(createHeart, 100);
    </script>

</body>
</html>
